<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Моја Историја - Daily Debugger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 700px;">
    <div class="mb-3">
        <a href="/game" class="btn btn-secondary btn-sm">← Назад кон играта</a>
    </div>
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h3>📅 Историја на решени задачи за: <span th:text="${username}"></span></h3>
        </div>
        <div class="card-body">
            <p class="text-muted">Овде можете да видите кои денови сте ги погодиле точно:</p>
            <ul class="list-group">
                <li th:each="item : ${history}" class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <strong>Загатка ID:</strong> <span th:text="${item.puzzle.id}"></span> |
                        <strong>Датум:</strong> <span th:text="${item.solvedDate}"></span>
                    </div>
                    <span th:if="${item.correct}" class="badge bg-success p-2">Точно Решено</span>
                    <span th:if="${!item.correct}" class="badge bg-danger p-2">Неточно</span>
                </li>
            </ul>
            <div th:if="${#lists.isEmpty(history)}" class="text-center py-4 text-muted">
                Сè уште немате одиграно партии со овој профил.
            </div>
        </div>
    </div>
</div>
</body>
</html>
