<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ранг Листа - Daily Debugger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 600px;">
    <div class="mb-3">
        <a href="/game" class="btn btn-secondary btn-sm">← Назад кон играта</a>
    </div>
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h3>🏆 Топ 10 Програмери</h3>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover mt-2">
                <thead>
                <tr>
                    <th>Позиција</th>
                    <th>Корисничко Име</th>
                    <th>Поени</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user, iter : ${leaderboard}">
                    <td th:text="${iter.count}">1</td>
                    <td th:text="${user.username}" class="fw-bold">User</td>
                    <td th:text="${user.score}" class="text-success fw-bold">0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
