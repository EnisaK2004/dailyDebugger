<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Daily Debugger</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <!-- Хедер со статус за логирање -->
    <div class="d-flex justify-content-between align-content-center mb-4 p-3 bg-white shadow-sm rounded">
        <h4>Здраво, <span th:text="${username}" class="text-primary">Корисник</span>!</h4>
        <div>
            <a href="/game" class="btn btn-outline-secondary btn-sm">Играј</a>
            <a href="/game/leaderboard" class="btn btn-outline-secondary btn-sm">Ранг Листа</a>
            <a th:if="${username != 'Анонимен'}" href="/game/history" class="btn btn-outline-secondary btn-sm">Моја Историја</a>
            <a th:if="${username == 'Анонимен'}" href="/game/login" class="btn btn-primary btn-sm">Најави се</a>
            <a th:if="${username != 'Анониmen' and username != 'Анонимен'}" href="/game/logout" class="btn btn-danger btn-sm">Одјава</a>
        </div>
    </div>

    <!-- Главна игра -->
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h3 class="card-title mb-0">Пронајди го дефектот (Код на денот)</h3>
        </div>
        <div class="card-body">
            <p class="text-muted">Анализирај го кодот подолу и погоди ја грешката или точниот одговор:</p>

            <!-- Приказ на кодот со симулиран изглед на терминал -->
            <pre class="bg-dark text-warning p-4 rounded text-start" style="font-family: monospace; font-size: 1.1rem;"><code th:text="${puzzle.snippet}">// Кодот се вчитува тука</code></pre>

            <!-- Приказ на резултат по праќање -->
            <div th:if="${hasGuessed}" class="mt-3">
                <div th:if="${isCorrect}" class="alert alert-success">
                    🎉 Точно! Успешно го реши денешниот предизвик.
                </div>
                <div th:if="${!isCorrect}" class="alert alert-danger">
                    ❌ Неточно. Обиди се повторно!
                </div>
            </div>

            <!-- Форма за внесување одговор -->
            <form th:action="@{/game/guess}" method="post" class="mt-4">
                <div class="input-group mb-3">
                    <input type="text" name="guess" class="form-control form-control-lg" placeholder="Внеси го твоето решение тука..." required>
                    <button class="btn btn-success btn-lg" type="submit">Провери</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
